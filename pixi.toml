[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]
preview = ["pixi-build"]

# https://github.com/python/cpython/pull/142872

[feature.python-default.dependencies]
python.git = "https://github.com/crusaderky/cpython"
python.rev = "tsan"
python.subdirectory = "Tools/pixi-packages/default"

[feature.python-asan.dependencies]
python.git = "https://github.com/crusaderky/cpython"
python.rev = "tsan"
python.subdirectory = "Tools/pixi-packages/asan"

[feature.python-freethreading.dependencies]
python.git = "https://github.com/crusaderky/cpython"
python.rev = "tsan"
python.subdirectory = "Tools/pixi-packages/freethreading"

[feature.python-tsan-freethreading.dependencies]
python.git = "https://github.com/crusaderky/cpython"
python.rev = "tsan"
python.subdirectory = "Tools/pixi-packages/tsan-freethreading"

# https://github.com/numpy/numpy/pull/30510
# (points to https://github.com/python/cpython/pull/142872
# with unlocked git rev)

[feature.numpy-default.dependencies]
numpy.git = "https://github.com/ngoldbaum/numpy"
numpy.rev = "tsan-ft-pixi"
numpy.subdirectory = "pixi-packages/default"

[feature.numpy-asan.dependencies]
numpy.git = "https://github.com/ngoldbaum/numpy"
numpy.rev = "tsan-ft-pixi"
numpy.subdirectory = "pixi-packages/asan"

[feature.numpy-freethreading.dependencies]
numpy.git = "https://github.com/ngoldbaum/numpy"
numpy.rev = "tsan-ft-pixi"
numpy.subdirectory = "pixi-packages/freethreading"

[feature.numpy-tsan-freethreading.dependencies]
numpy.git = "https://github.com/ngoldbaum/numpy"
numpy.rev = "tsan-ft-pixi"
numpy.subdirectory = "pixi-packages/tsan-freethreading"

# ---

[feature.python.tasks]
python-version = "python -c 'import sys; print(sys.version)'"

[feature.numpy.tasks]
numpy-version = "python -c 'import numpy; print(numpy.__version__)'"

[feature.numpy-asan.activation.env]
# Suppress ASAN false positives on 'import numpy'
ASAN_OPTIONS = "detect_leaks=0:symbolize=1:strict_init_order=true:allocator_may_return_null=1:use_sigaltstack=0"

[environments]
python-default = ["python", "python-default"]
python-asan = ["python", "python-asan"]
python-freethreading = ["python", "python-freethreading"]
python-tsan-freethreading = ["python", "python-tsan-freethreading"]

numpy-default = ["python", "python-default", "numpy", "numpy-default"]
numpy-asan = ["python", "python-asan", "numpy", "numpy-asan"]
numpy-freethreading = ["python", "python-freethreading", "numpy", "numpy-freethreading"]
numpy-tsan-freethreading = ["python", "python-tsan-freethreading", "numpy", "numpy-tsan-freethreading"]
